name: CI (Fast)

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      test_filter:
        description: "Optional VSTest filter for fast-lane test selection"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: ci-fast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: "1"
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build_and_test:
    name: Fast build + tests (.NET 8)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            **/*.csproj

      - name: Resolve fast lane filter
        shell: bash
        run: |
          TEST_FILTER="${{ github.event.inputs.test_filter || '' }}"
          DEFAULT_FAST_FILTER="(Lane=unit|Lane=integration)"

          if [ -n "$TEST_FILTER" ]; then
            echo "TEST_FILTER_ARG=--filter $TEST_FILTER" >> "$GITHUB_ENV"
          else
            echo "TEST_FILTER_ARG=--filter $DEFAULT_FAST_FILTER" >> "$GITHUB_ENV"
          fi

      - name: Restore
        run: dotnet restore TimefallDeck.sln

      - name: Build
        run: dotnet build TimefallDeck.sln --configuration Release --no-restore

      - name: Verify fast lanes have targeted tests
        shell: bash
        run: |
          verify_lane() {
            local lane="$1"
            local output
            output="$(dotnet test TimefallDeck.sln --configuration Release --no-build --list-tests --filter "Lane=$lane")"
            echo "$output"

            if ! echo "$output" | rg -q '^\s*Game\.Tests\.'; then
              echo "No tests discovered for Lane=$lane"
              exit 1
            fi
          }

          verify_lane "unit"
          verify_lane "integration"

      - name: Run tests
        shell: bash
        run: |
          dotnet test TimefallDeck.sln \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./artifacts/test-results \
            $TEST_FILTER_ARG

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fast-ci-test-artifacts
          path: |
            artifacts/test-results/**/*.trx
            artifacts/test-results/**
            **/TestResults/**
            **/coverage*/**
          if-no-files-found: ignore
